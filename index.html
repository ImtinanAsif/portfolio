<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMTINAN ASIF | OFFICIAL</title>
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;900&family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Texture & Custom Cursor -->
    <div class="noise"></div>
    <div class="cursor"></div>

    <nav class="nav">
        <div class="nav-brand">IMTINAN<span>.</span></div>
        <div class="nav-links">
            <a href="#services" class="nav-item">Expertise</a>
            <a href="#reels" class="nav-item">Archive</a>
            <a href="#contact" class="nav-item">Contact</a>
        </div>
    </nav>

    <main id="scroll-wrapper">
        <!-- HERO -->
        <section class="hero" id="home">
            <div class="hero-container">
                <div class="hero-title">
                    <h1 class="reveal-text">VIDEO</h1>
                    <h1 class="reveal-text lime-stroke">EDITING</h1>
                </div>
                <div class="hero-desc">
                    <p>Based in Pakistan / Digital Excellence</p>
                    <div class="status"><span></span> AVAILABLE FOR PROJECTS</div>
                </div>
            </div>
        </section>

        <!-- SERVICES: EDITORIAL LIST -->
        <section class="services" id="services">
            <div class="section-label">/001 EXPERTISE</div>
            <div class="services-list">
                <div class="service-row">
                    <div class="row-title"><span>01</span><h2>WEB ARCHITECTURE</h2></div>
                    <div class="row-desc">HIGH-PERFORMANCE SYSTEMS</div>
                </div>
                <div class="service-row">
                    <div class="row-title"><span>02</span><h2>INTERFACE DESIGN</h2></div>
                    <div class="row-desc">HIGH-CONVERSION UX</div>
                </div>
                <div class="service-row">
                    <div class="row-title"><span>03</span><h2>MOTION GRAPHICS</h2></div>
                    <div class="row-desc">DYNAMIC VIDEO EDITING</div>
                </div>
            </div>
        </section>

        <!-- REELS: FIXED GRID & SIZING -->
        <section class="reels" id="reels">
            <div class="section-label">/002 MOTION ARCHIVE</div>
            <div class="reels-grid">
                <div class="reel-item">
                    <video loop muted playsinline crossorigin="anonymous">
                        <source src="https://drive.google.com/uc?export=download&id=176jQwvSaBsfzO2GKVWNtI7Wid8HqdzDt/preview" type="video/mp4">
                    </video>
                </div>
                <div class="reel-item">
                    <video loop muted playsinline crossorigin="anonymous">
                        <source src="https://drive.google.com/uc?export=download&id=1JwKtIqiEdS2pBeGo1OWRIDcQOQAEJUAw/preview" type="video/mp4">
                    </video>
                </div>
                <div class="reel-item">
                    <video loop muted playsinline crossorigin="anonymous">
                        <source src="https://drive.google.com/uc?export=download&id=12Y0hZfVi1LjPXZOHeLB3NFyWmKsI-8ot/preview" type="video/mp4">
                    </video>
                </div>
                <div class="reel-item">
                    <video loop muted playsinline crossorigin="anonymous">
                        <source src="https://drive.google.com/uc?export=download&id=1hk_yquXqjJZ76Cw24cEFpSeg--k9P27B/preview" type="video/mp4">
                    </video>
                </div>
                <div class="reel-item">
                    <video loop muted playsinline crossorigin="anonymous">
                        <source src="https://drive.google.com/uc?export=download&id=1uqTnPuwuhpJ-BkwIRInIXysvvmjfCSC2/preview" type="video/mp4">
                    </video>
                </div>
            </div>
        </section>

        <!-- CONTACT: MINIMALIST FORM -->
        <section class="contact" id="contact">
            <div class="contact-header">
                <h2 class="huge-text">GET IN <span class="lime-text">TOUCH</span></h2>
            </div>
            <form class="contact-form" id="portfolio-form">
                <div class="form-row">
                    <div class="input-wrap">
                        <label>NAME</label>
                        <input type="text" id="user-name" placeholder="YOUR NAME" required>
                    </div>
                    <div class="input-wrap">
                        <label>EMAIL</label>
                        <input type="email" id="user-email" placeholder="YOUR EMAIL" required>
                    </div>
                </div>
                <div class="input-wrap full">
                    <label>PROJECT DETAILS</label>
                    <textarea id="user-message" rows="1" placeholder="TELL ME ABOUT YOUR VISION" required></textarea>
                </div>
                <button type="submit" class="submit-btn">
                    <span>SEND REQUEST</span>
                    <div class="btn-hover-layer"></div>
                </button>
            </form>
        </section>
    </main>

    <!-- Essential Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
