<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMTINAN ASIF | OFFICIAL</title>
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Grain Overlay for Texture -->
    <div class="noise"></div>

    <!-- Custom Cursor -->
    <div class="cursor"></div>

    <nav class="nav">
        <div class="nav-brand">IMTINAN ASIF</div>
        <div class="nav-links">
            <a href="#work" class="nav-item">Work</a>
            <a href="#about" class="nav-item">About</a>
            <a href="#contact" class="nav-item">Contact</a>
        </div>
    </nav>

    <main data-scroll-container>
        <!-- Hero Section -->
        <section class="hero">
            <div class="hero-title-wrapper">
                <h1 class="reveal-text">CREATIVE</h1>
                <h1 class="reveal-text outline">DEVELOPER</h1>
            </div>
            <div class="hero-footer">
                <p>Based in Pakistan / Available Worldwide</p>
                <div class="scroll-indicator">SCROLL</div>
            </div>
        </section>

        <!-- Project Grid (Reactive Image Animation) -->
        <section class="work" id="work">
            <div class="section-label">PROJECTS / 001</div>
            <div class="work-grid">
                <div class="project-card">
                    <div class="img-reveal">
                        <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=1528" alt="Design">
                    </div>
                    <div class="project-info">
                        <h3>Digital Architecture</h3>
                        <span>UI/UX DESIGN</span>
                    </div>
                </div>
                <div class="project-card">
                    <div class="img-reveal">
                        <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=1470" alt="Dev">
                    </div>
                    <div class="project-info">
                        <h3>Performance Engineering</h3>
                        <span>WEB DEVELOPMENT</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- GSAP & Lenis for $10k Motion -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
